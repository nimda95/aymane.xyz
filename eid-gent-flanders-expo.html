<!DOCTYPE html>
<html lang="nl" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid al-Adha 2026 · Gent — Bijdragen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --orange: #C8601A;
      --orange-lt: #E07830;
      --navy: #1A2B52;
      --gold: #C8811A;
      --text: #2A1F0E;
      --card-bg: rgba(253, 246, 232, 0.92);
      --r: 20px;
      --t: 0.22s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(165deg, #FBF3E0 0%, #F5E6C0 45%, #EDD9A0 100%);
      font-family: 'Lato', sans-serif;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(circle, rgba(180, 100, 20, 0.055) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .wm {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-10deg);
      font-family: 'Amiri', serif;
      font-weight: 700;
      font-size: clamp(90px, 18vw, 280px);
      color: rgba(200, 129, 26, 0.06);
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      user-select: none;
    }

    .frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      border: 7px solid var(--orange);
    }

    .frame-inner {
      position: fixed;
      inset: 18px;
      pointer-events: none;
      z-index: 2;
      border: 1.5px solid rgba(200, 96, 26, 0.25);
    }

    .cs {
      position: fixed;
      z-index: 3;
      pointer-events: none;
      width: 32px;
      height: 32px;
      opacity: 0.70;
    }

    .cs-tl {
      top: 24px;
      left: 24px;
    }

    .cs-tr {
      top: 24px;
      right: 24px;
    }

    .cs-bl {
      bottom: 24px;
      left: 24px;
    }

    .cs-br {
      bottom: 24px;
      right: 24px;
    }

    .lantern {
      position: fixed;
      top: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.80;
    }

    .lantern-l {
      left: 0;
    }

    .lantern-r {
      right: 0;
      transform: scaleX(-1);
    }

    .sw-a {
      animation: swayA 5s ease-in-out infinite;
      transform-origin: top center;
    }

    .sw-b {
      animation: swayB 7s ease-in-out infinite;
      transform-origin: top center;
    }

    /* lang bar */
    .lang-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 20;
      direction: ltr;
    }

    .lang-btn {
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .12em;
      padding: 6px 15px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      transition: var(--t);
      background: transparent;
      color: rgba(26, 43, 82, 0.42);
    }

    .lang-btn:hover {
      color: var(--orange);
    }

    .lang-btn.active {
      background: var(--orange);
      color: #FFF8EE;
      box-shadow: 0 3px 12px rgba(200, 96, 26, 0.28);
    }

    /* page */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 88px 24px 88px;
    }

    /* header */
    .header {
      text-align: center;
      margin-bottom: 4px;
      animation: fadeDown .8s ease both;
    }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(10px, 1.4vw, 13px);
      letter-spacing: .28em;
      text-transform: uppercase;
      color: rgba(26, 43, 82, 0.45);
      margin-bottom: 12px;
    }

    .eid-title {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(40px, 8vw, 86px);
      color: var(--orange);
      line-height: .95;
      letter-spacing: -.01em;
    }

    .eid-title .sub {
      display: block;
      font-family: 'Amiri', serif;
      font-weight: 700;
      font-size: clamp(22px, 4vw, 48px);
      color: rgba(200, 96, 26, 0.46);
      line-height: 1.15;
      margin-top: 4px;
      direction: rtl;
    }

    .header-date {
      margin-top: 12px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(12px, 1.7vw, 16px);
      color: var(--navy);
      letter-spacing: .06em;
    }

    /* divider */
    .div {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 500px;
      margin: 24px auto;
      animation: fadeIn 1s ease .3s both;
    }

    .dl {
      flex: 1;
      height: 1.5px;
      background: var(--orange);
      opacity: .28;
    }

    .dd {
      width: 13px;
      height: 13px;
      background: var(--orange);
      opacity: .58;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .dt {
      width: 6px;
      height: 6px;
      background: var(--orange);
      opacity: .44;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* intro */
    .intro {
      text-align: center;
      max-width: 490px;
      margin-bottom: 32px;
      animation: fadeIn 1s ease .4s both;
    }

    .intro p {
      font-size: clamp(13px, 1.8vw, 15px);
      line-height: 1.80;
      color: rgba(26, 43, 82, 0.70);
    }

    .intro .ar-p {
      font-family: 'Amiri', serif;
      font-size: clamp(18px, 2.4vw, 22px);
      color: rgba(26, 43, 82, 0.54);
      direction: rtl;
      margin-top: 10px;
    }

    /* sections */
    .sections {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 500px;
    }

    .sec {
      background: var(--card-bg);
      border: 2px solid rgba(200, 96, 26, 0.20);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: 0 4px 22px rgba(180, 80, 15, 0.07);
      animation: fadeUp .7s ease both;
    }

    .sec:nth-child(1) {
      animation-delay: .48s;
    }

    .sec:nth-child(2) {
      animation-delay: .62s;
    }

    .sec-head {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px 24px 18px;
      border-bottom: 1.5px solid rgba(200, 96, 26, 0.12);
    }

    .sec-icon {
      width: 54px;
      height: 54px;
      border-radius: 13px;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(200, 96, 26, 0.26);
    }

    .sec-icon svg {
      width: 28px;
      height: 28px;
    }

    .sec-meta {
      flex: 1;
    }

    .sec-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 2px;
    }

    .sec-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(16px, 2.4vw, 21px);
      color: var(--navy);
      line-height: 1.2;
    }

    .sec-body {
      padding: 20px 24px 22px;
    }

    /* SumUp CTA */
    .sumup-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      width: 100%;
      padding: 16px;
      background: var(--orange);
      color: #FFF8EE;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: .03em;
      box-shadow: 0 6px 20px rgba(200, 96, 26, 0.28);
      transition: var(--t);
      margin-bottom: 18px;
    }

    .sumup-btn:hover {
      background: var(--orange-lt);
      box-shadow: 0 8px 26px rgba(200, 96, 26, 0.36);
      transform: translateY(-2px);
    }

    .sumup-btn:active {
      transform: translateY(0);
    }

    /* Payment icons */
    .pay-icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      direction: ltr;
    }

    .pay-icon {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(200, 96, 26, 0.15);
      border-radius: 7px;
      padding: 4px 10px;
    }

    .pay-icon svg {
      height: 18px;
      width: auto;
    }

    /* IBAN / comm fields */
    .field-block {
      background: rgba(255, 255, 255, 0.55);
      border: 1.5px solid rgba(200, 96, 26, 0.18);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .field-block:last-child {
      margin-bottom: 0;
    }

    .field-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 6px;
      display: block;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
      direction: ltr;
    }

    .field-value {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(15px, 3vw, 20px);
      color: var(--navy);
      letter-spacing: .08em;
      flex: 1;
      word-break: break-all;
    }

    .comm-value {
      letter-spacing: .14em;
    }

    /* Copy button */
    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 9px;
      border: none;
      background: var(--orange);
      color: #FFF8EE;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: var(--t);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      background: var(--orange-lt);
    }

    .copy-btn.copied {
      background: #2a7a3a;
    }

    .copy-btn svg {
      width: 13px;
      height: 13px;
    }

    /* footer */
    .fnote {
      margin-top: 40px;
      text-align: center;
      animation: fadeIn 1s ease .9s both;
    }

    .fnote p {
      font-size: 11.5px;
      color: rgba(26, 43, 82, 0.40);
      line-height: 1.75;
    }

    .fnote .ar-n {
      font-family: 'Amiri', serif;
      font-size: 14px;
      direction: rtl;
      color: rgba(26, 43, 82, 0.36);
      margin-top: 7px;
    }

    .jzk {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: var(--orange);
      opacity: .70;
      margin-top: 12px;
      letter-spacing: .04em;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: #FFF8EE;
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 30px;
      opacity: 0;
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.22);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* animations */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes swayA {

      0%,
      100% {
        transform: rotate(-2.5deg) translateY(0)
      }

      50% {
        transform: rotate(2deg) translateY(6px)
      }
    }

    @keyframes swayB {

      0%,
      100% {
        transform: rotate(1.5deg) translateY(0)
      }

      50% {
        transform: rotate(-2deg) translateY(8px)
      }
    }

    /* ── RTL overrides ── */
    [dir=rtl] .sec-head {
      flex-direction: row-reverse;
    }

    [dir=rtl] .sec-meta,
    [dir=rtl] .field-label {
      text-align: right;
    }

    [dir=rtl] .intro p,
    [dir=rtl] .fnote p {
      text-align: right;
    }

    /* Apply Amiri to all text elements in AR mode so it matches the quality
   of the Arabic subtitle shown in other language versions               */
    [dir=rtl] .intro p,
    [dir=rtl] .header-date,
    [dir=rtl] .sec-title,
    [dir=rtl] .sec-label,
    [dir=rtl] .sumup-btn,
    [dir=rtl] .fnote p {
      font-family: 'Amiri', serif;
      font-size: 1.12em;
    }

    [dir=rtl] .sec-title {
      font-size: clamp(18px, 2.8vw, 24px);
    }

    /* field-row stays direction:ltr so copy button is always on the right
   of the number — but we flip the order so value is right, btn is left */
    [dir=rtl] .field-row {
      flex-direction: row-reverse;
    }

    @media(max-width:420px) {
      .lang-btn {
        padding: 5px 10px;
        font-size: 11px;
      }

      .field-value {
        font-size: 15px;
      }
    }
  </style>
</head>

      if (n.startsWith('fr')) return 'fr';
      if (n.startsWith('nl')) return 'nl';
      return 'en';
    }

    function setLang(l) {
      curLang = l;
      const t = T[l];
      document.documentElement.lang = l;
      document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (t[k] !== undefined) el.innerHTML = t[k];
      });
      const arP = document.querySelector('.ar-p');
      if (arP) arP.style.display = (l === 'ar' || !t.intro_ar) ? 'none' : '';
      const arN = document.querySelector('.ar-n');
      if (arN) arN.style.display = (l === 'ar' || !t.footer_ar) ? 'none' : '';
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l));
    }

    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function doCopy(text, btnId, lblId) {
      const btn = document.getElementById(btnId);
      const lbl = document.getElementById(lblId);
      const ok = T[curLang].copy_ok || 'Copied ✓';
      const apply = () => {
        btn.classList.add('copied');
        lbl.textContent = ok;
        btn.querySelectorAll('.icon-copy').forEach(i => i.style.display = 'none');
        btn.querySelectorAll('.icon-check').forEach(i => i.style.display = '');
        showToast(ok);
        setTimeout(() => {
          btn.classList.remove('copied');
          lbl.textContent = T[curLang].copy_btn;
          btn.querySelectorAll('.icon-copy').forEach(i => i.style.display = '');
          btn.querySelectorAll('.icon-check').forEach(i => i.style.display = 'none');
        }, 2200);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(apply).catch(() => { fallback(text); apply(); });
      } else { fallback(text); apply(); }
    }

    function fallback(text) {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }

    (function () { setLang(detectLang()); })();
  </script>
</body>

</html>
