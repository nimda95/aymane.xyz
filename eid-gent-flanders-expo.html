<html lang="nl" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid al-Adha 2026 · Gent — Bijdragen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#FAF0D7;--cream-lt:#FDF6E8;--orange:#C8601A;--orange-lt:#E07830;
  --navy:#1A2B52;--gold:#C8811A;--text:#2A1F0E;
  --card-bg:rgba(253,246,232,0.90);--r:20px;--t:0.22s ease;
}
html{scroll-behavior:smooth;}
body{
  min-height:100vh;
  background:linear-gradient(165deg,#FBF3E0 0%,#F5E6C0 45%,#EDD9A0 100%);
  font-family:'Lato',sans-serif;color:var(--text);
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(180,100,20,0.055) 1px,transparent 1px);
  background-size:32px 32px;
}
.wm{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-10deg);
  font-family:'Amiri',serif;font-weight:700;
  font-size:clamp(90px,18vw,280px);
  color:rgba(200,129,26,0.065);white-space:nowrap;
  pointer-events:none;z-index:0;user-select:none;
}
.frame{position:fixed;inset:0;pointer-events:none;z-index:2;border:7px solid var(--orange);}
.frame-inner{position:fixed;inset:18px;pointer-events:none;z-index:2;border:1.5px solid rgba(200,96,26,0.25);}
.cs{position:fixed;z-index:3;pointer-events:none;width:32px;height:32px;opacity:0.70;}
.cs-tl{top:24px;left:24px;}.cs-tr{top:24px;right:24px;}
.cs-bl{bottom:24px;left:24px;}.cs-br{bottom:24px;right:24px;}
.lantern{position:fixed;top:0;z-index:1;pointer-events:none;opacity:0.80;}
.lantern-l{left:0;}.lantern-r{right:0;transform:scaleX(-1);}
.sw-a{animation:swayA 5s ease-in-out infinite;transform-origin:top center;}
.sw-b{animation:swayB 7s ease-in-out infinite;transform-origin:top center;}

/* lang bar */
.lang-bar{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:20;direction:ltr;
}
.lang-btn{
  font-family:'Lato',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:0.12em;padding:6px 15px;border-radius:30px;border:none;
  cursor:pointer;transition:var(--t);background:transparent;
  color:rgba(26,43,82,0.42);
}
.lang-btn:hover{color:var(--orange);}
.lang-btn.active{background:var(--orange);color:#FFF8EE;box-shadow:0 3px 12px rgba(200,96,26,0.28);}

/* page */
.page{
  position:relative;z-index:10;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:88px 24px 88px;
}

/* header */
.header{text-align:center;margin-bottom:4px;animation:fadeDown .8s ease both;}
.eyebrow{
  font-family:'Lato',sans-serif;font-weight:300;
  font-size:clamp(10px,1.4vw,13px);letter-spacing:.28em;
  text-transform:uppercase;color:rgba(26,43,82,0.45);margin-bottom:12px;
}
.eid-title{
  font-family:'Playfair Display',serif;font-weight:800;
  font-size:clamp(40px,8vw,86px);color:var(--orange);
  line-height:.95;letter-spacing:-.01em;
}
.eid-title .sub{
  display:block;font-family:'Amiri',serif;font-weight:700;
  font-size:clamp(22px,4vw,48px);color:rgba(200,96,26,0.46);
  line-height:1.15;margin-top:4px;direction:rtl;
}
.header-date{
  margin-top:12px;font-family:'Playfair Display',serif;
  font-size:clamp(12px,1.7vw,16px);color:var(--navy);letter-spacing:.06em;
}

/* divider */
.div{display:flex;align-items:center;gap:12px;width:100%;max-width:500px;margin:24px auto;animation:fadeIn 1s ease .3s both;}
.dl{flex:1;height:1.5px;background:var(--orange);opacity:.28;}
.dd{width:13px;height:13px;background:var(--orange);opacity:.58;transform:rotate(45deg);flex-shrink:0;}
.dt{width:6px;height:6px;background:var(--orange);opacity:.44;border-radius:50%;flex-shrink:0;}

/* intro */
.intro{text-align:center;max-width:490px;margin-bottom:34px;animation:fadeIn 1s ease .4s both;}
.intro p{font-size:clamp(13px,1.8vw,15px);line-height:1.80;color:rgba(26,43,82,0.70);}
.intro .ar-p{font-family:'Amiri',serif;font-size:clamp(16px,2.2vw,20px);color:rgba(26,43,82,0.54);direction:rtl;margin-top:10px;}

/* cards */
.cards{display:flex;flex-direction:column;gap:18px;width:100%;max-width:490px;}
.card{
  background:var(--card-bg);border:2px solid rgba(200,96,26,0.20);
  border-radius:var(--r);padding:24px 26px;
  text-decoration:none;color:inherit;
  display:flex;align-items:center;gap:18px;
  position:relative;overflow:hidden;cursor:pointer;
  transition:transform var(--t),box-shadow var(--t),border-color var(--t);
  animation:fadeUp .7s ease both;
  box-shadow:0 4px 20px rgba(180,80,15,0.07);
}
.card:nth-child(1){animation-delay:.50s;}.card:nth-child(2){animation-delay:.65s;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,96,26,0.06) 0%,transparent 60%);opacity:0;transition:opacity var(--t);pointer-events:none;}
.card:hover{transform:translateY(-4px) scale(1.012);box-shadow:0 12px 36px rgba(180,80,15,0.14);border-color:rgba(200,96,26,0.48);}
.card:hover::before{opacity:1;}
.card:active{transform:translateY(-1px) scale(1.005);}
.ci{
  width:66px;height:66px;border-radius:14px;background:var(--orange);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 14px rgba(200,96,26,0.26);transition:background var(--t);
}
.card:hover .ci{background:var(--orange-lt);}
.ci svg{width:34px;height:34px;}
.cb{flex:1;min-width:0;}
.cl{font-family:'Lato',sans-serif;font-weight:300;font-size:10.5px;letter-spacing:.20em;text-transform:uppercase;color:var(--orange);margin-bottom:3px;}
.ct{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(17px,2.6vw,23px);color:var(--navy);line-height:1.15;}
.cd{font-size:12.5px;color:rgba(26,43,82,0.50);margin-top:4px;line-height:1.5;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.chip{font-size:10.5px;padding:2px 9px;border-radius:20px;border:1px solid rgba(200,96,26,0.26);color:var(--orange);background:rgba(200,96,26,0.06);}
.ca{color:var(--orange);opacity:.38;flex-shrink:0;transition:opacity var(--t),transform var(--t);}
.card:hover .ca{opacity:.86;transform:translateX(5px);}

/* footer */
.fnote{margin-top:40px;text-align:center;animation:fadeIn 1s ease .9s both;}
.fnote p{font-size:11.5px;color:rgba(26,43,82,0.40);line-height:1.75;}
.fnote .ar-n{font-family:'Amiri',serif;font-size:14px;direction:rtl;color:rgba(26,43,82,0.36);margin-top:7px;}
.jzk{font-family:'Playfair Display',serif;font-size:13px;color:var(--orange);opacity:.70;margin-top:12px;letter-spacing:.04em;}

/* ── popup ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(28,14,4,0.44);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.overlay.open{opacity:1;pointer-events:all;}
.popup{
  background:linear-gradient(158deg,#FDF6E8 0%,#F3E0B0 100%);
  border:2.5px solid rgba(200,96,26,0.28);border-radius:24px;
  padding:34px 30px 30px;width:100%;max-width:400px;position:relative;
  box-shadow:0 24px 72px rgba(100,40,0,0.22);
  transform:translateY(22px) scale(0.96);
  transition:transform .30s cubic-bezier(.34,1.56,.64,1),opacity .25s ease;opacity:0;
}
.overlay.open .popup{transform:translateY(0) scale(1);opacity:1;}
.pcl{
  position:absolute;top:13px;right:15px;width:28px;height:28px;border:none;
  background:transparent;cursor:pointer;color:rgba(26,43,82,0.32);font-size:21px;
  line-height:1;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:var(--t);
}
.pcl:hover{color:var(--orange);background:rgba(200,96,26,0.08);}
.ph{text-align:center;margin-bottom:20px;}
.pe{font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);margin-bottom:5px;}
.pt{font-family:'Playfair Display',serif;font-weight:700;font-size:21px;color:var(--navy);line-height:1.2;}
.ps{font-size:12px;color:rgba(26,43,82,0.50);margin-top:4px;line-height:1.55;}
.pdiv{display:flex;align-items:center;gap:10px;margin:16px 0;}
.pdl{flex:1;height:1px;background:var(--orange);opacity:.20;}
.pdd{width:10px;height:10px;background:var(--orange);opacity:.46;transform:rotate(45deg);flex-shrink:0;}
/* amounts grid */
.amts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;direction:ltr;}
.ab{
  font-family:'Playfair Display',serif;font-weight:700;font-size:15px;
  padding:11px 4px;border-radius:11px;border:2px solid rgba(200,96,26,0.22);
  background:rgba(200,96,26,0.06);color:var(--navy);cursor:pointer;
  transition:var(--t);text-align:center;
}
.ab:hover{border-color:var(--orange);background:rgba(200,96,26,0.12);color:var(--orange);}
.ab.sel{background:var(--orange);border-color:var(--orange);color:#FFF8EE;}
/* custom input */
.cll{font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(26,43,82,0.46);margin-bottom:7px;display:block;}
.ir{display:flex;border:2px solid rgba(200,96,26,0.25);border-radius:11px;overflow:hidden;background:#FDF6E8;transition:border-color var(--t);direction:ltr;}
.ir:focus-within{border-color:var(--orange);}
.eu{padding:12px 13px;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--orange);background:rgba(200,96,26,0.07);border-right:1.5px solid rgba(200,96,26,0.16);flex-shrink:0;}
.ai{flex:1;padding:12px 13px;border:none;outline:none;font-family:'Playfair Display',serif;font-weight:700;font-size:19px;color:var(--navy);background:transparent;width:100%;}
.ai::placeholder{color:rgba(26,43,82,0.20);font-weight:400;}
/* proceed btn */
.pb{
  margin-top:18px;width:100%;padding:15px;background:var(--orange);color:#FFF8EE;
  border:none;border-radius:13px;cursor:pointer;
  font-family:'Playfair Display',serif;font-weight:700;font-size:16px;letter-spacing:.04em;
  box-shadow:0 6px 20px rgba(200,96,26,0.28);transition:var(--t);
  display:flex;align-items:center;justify-content:center;gap:9px;
}
.pb:hover{background:var(--orange-lt);box-shadow:0 8px 26px rgba(200,96,26,0.36);transform:translateY(-1px);}
.pb:disabled{background:rgba(200,96,26,0.28);cursor:not-allowed;box-shadow:none;transform:none;}

/* animations */
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes swayA{0%,100%{transform:rotate(-2.5deg) translateY(0)}50%{transform:rotate(2deg) translateY(6px)}}
@keyframes swayB{0%,100%{transform:rotate(1.5deg) translateY(0)}50%{transform:rotate(-2deg) translateY(8px)}}

/* RTL */
[dir=rtl] .card{flex-direction:row-reverse;}
[dir=rtl] .chips{justify-content:flex-end;}
[dir=rtl] .ca{transform:scaleX(-1);}
[dir=rtl] .card:hover .ca{transform:scaleX(-1) translateX(-5px);}
[dir=rtl] .cb{text-align:right;}
[dir=rtl] .intro p{text-align:right;}
[dir=rtl] .fnote{text-align:right;}

@media(max-width:420px){
  .amts{grid-template-columns:repeat(4,1fr);}
  .ab{font-size:13px;padding:9px 2px;}
  .lang-btn{padding:5px 10px;font-size:11px;}
}
</style>
</head>

let curLang='nl';

function detectLang(){
  const n=(navigator.language||'').toLowerCase();
  if(n.startsWith('ar'))return'ar';
  if(n.startsWith('fr'))return'fr';
  if(n.startsWith('nl'))return'nl';
  return'en';
}

function setLang(l){
  curLang=l;
  const t=T[l];
  const rtl=l==='ar';
  document.documentElement.lang=l;
  document.documentElement.dir=rtl?'rtl':'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.dataset.i18n;
    if(t[k]!==undefined) el.innerHTML=t[k];
  });
  // hide Arabic subtitle in AR mode (already in Arabic)
  const arP=document.querySelector('.ar-p');
  if(arP) arP.style.display=(l==='ar'||!t.intro_ar)?'none':'';
  const arN=document.querySelector('.ar-n');
  if(arN) arN.style.display=(l==='ar'||!t.footer_ar)?'none':'';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  updBtn();
}

/* popup */
let selAmt_=null;
function openPopup(){document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden';}
function closePopup(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  selAmt_=null;
  document.querySelectorAll('.ab').forEach(b=>b.classList.remove('sel'));
  document.getElementById('amt-in').value='';
  updBtn();
}
function handleOverlay(e){if(e.target===document.getElementById('overlay'))closePopup();}
function selAmt(v){
  selAmt_=v;
  document.getElementById('amt-in').value=v;
  document.querySelectorAll('.ab').forEach(b=>b.classList.toggle('sel',Number(b.dataset.val)===v));
  updBtn();
}
function onCustom(){
  const v=parseFloat(document.getElementById('amt-in').value);
  if(!isNaN(v)&&v>0){
    selAmt_=v;
    document.querySelectorAll('.ab').forEach(b=>b.classList.toggle('sel',Number(b.dataset.val)===v));
  }else{
    selAmt_=null;
    document.querySelectorAll('.ab').forEach(b=>b.classList.remove('sel'));
  }
  updBtn();
}
function getAmt(){
  const v=parseFloat(document.getElementById('amt-in').value);
  return(!isNaN(v)&&v>=1&&v<=9999)?v:null;
}
function updBtn(){
  const btn=document.getElementById('proc-btn');
  const amt=getAmt();
  btn.disabled=!amt;
  const lbl=T[curLang].popup_btn;
  document.getElementById('proc-lbl').textContent=amt?`${lbl} \u00B7 \u20AC${Number.isInteger(amt)?amt:amt.toFixed(2)}`:lbl;
}
function goWise(){
  const amt=getAmt();if(!amt)return;
  const v=Number.isInteger(amt)?amt:amt.toFixed(2);
  window.open(`https://wise.com/pay/business/taibiaymane?amount=${v}&currency=EUR&description=eid-gent-flanders-expo`,'_blank','noopener,noreferrer');
  closePopup();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});
(function(){setLang(detectLang());})();
</script>
